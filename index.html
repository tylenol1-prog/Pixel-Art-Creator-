<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Art Creator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎨 Pixel Art Creator</h1>
        </header>

        <div class="main-content">
            <!-- Toolbar -->
            <div class="toolbar">
                <div class="tool-section">
                    <h3>Tools</h3>
                    <button class="tool-btn active" data-tool="pen" title="Pen Tool (P)">✏️ Pen</button>
                    <button class="tool-btn" data-tool="eraser" title="Eraser (E)">🗑️ Eraser</button>
                    <button class="tool-btn" data-tool="bucket" title="Bucket Fill (B)">🪣 Bucket</button>
                    <button class="tool-btn" data-tool="eyedropper" title="Color Picker (C)">🎯 Picker</button>
                </div>

                <div class="tool-section">
                    <h3>Grid Size</h3>
                    <div class="grid-controls">
                        <label>Width: <input type="number" id="gridWidth" value="16" min="8" max="64"></label>
                        <label>Height: <input type="number" id="gridHeight" value="16" min="8" max="64"></label>
                        <button id="applyGrid">Apply</button>
                    </div>
                </div>

                <div class="tool-section">
                    <h3>Colors</h3>
                    <input type="color" id="colorPicker" value="#000000" title="Pick a color">
                    <div class="color-history" id="colorHistory"></div>
                </div>

                <div class="tool-section">
                    <h3>Actions</h3>
                    <button id="undoBtn">↶ Undo</button>
                    <button id="redoBtn">↷ Redo</button>
                    <button id="clearBtn">🗑️ Clear</button>
                    <button id="downloadBtn">⬇️ Download</button>
                </div>
            </div>

            <!-- Canvas -->
            <div class="canvas-container">
                <div id="pixelCanvas" class="pixel-canvas"></div>
            </div>
        </div>

        <footer>
            <p>Use keyboard: P (Pen), E (Eraser), B (Bucket), C (Picker) | Right-click to erase</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
